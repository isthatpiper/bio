  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    /* Reset */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .container {
        position: relative;
        height: 100vh;

        display: flex;
        flex-direction: column;   /* stack vertically */
        justify-content: flex-start;  /* center vertically */
         align-items: center;      /* center horizontally */

        gap: 20px;                /* space between boxes */
}


    .container::before {
      content: "";
      position: absolute;
      inset: 0;

      background: url("https://res.cloudinary.com/dmsbvfkwr/image/upload/v1775722643/Screenshot_2026-02-25_162754_taycxj_1_xatedj.png") center/cover no-repeat;

      filter: blur(20px);
      transform: scale(1.1);

      z-index: -1;
    }


    .glass-box {
      padding: 30px 40px;
      border-radius: 15px;
      justify-content: flex-start;
      transform:translateY(180px);

      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);

      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);

      color: white;
      max-width: 400px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="container">

        <a href="https://discord.com/users/isthatpiper" class="discord-btn">Discord</a>
    </div>
  </div>
</body>
