<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Piper - Roblox</title>
  <link rel="stylesheet" href="style.css">
  <!-- Font Awesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
    /* Reset */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .container {
        position: relative;
        height: 100vh;

        display: flex;
        flex-direction: column;   /* stack vertically */
        justify-content: flex-start;  /* center vertically */
         align-items: center;      /* center horizontally */

        gap: 20px;                /* space between boxes */
}


    .container::before {
      content: "";
      position: absolute;
      inset: 0;

      background: url("https://res.cloudinary.com/dmsbvfkwr/image/upload/v1775722643/Screenshot_2026-02-25_162754_taycxj_1_xatedj.png") center/cover no-repeat;

      filter: blur(20px);
      transform: scale(1.1);

      z-index: -1;
    }


    .glass-box {
      padding: 30px 40px;
      border-radius: 15px;
      justify-content: flex-start;
      transform:translateY(300px);

      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);

      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);

      color: white;
      max-width: 400px;
      text-align: center;
    }

    .go-back-btn {
    position: fixed;
    bottom: 410px;
    left: 50%;
    transform: translateX(-50%);

    padding: 14px 28px;
    background: rgba(255, 255, 255, 0.22);
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 12px;
    color: white;
    font-family: Montserrat, sans-serif;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;

    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);

    transition: all 0.2s ease-in-out;
    z-index: 999;
}

.go-back-btn:hover {
    transform: translateX(-50%) scale(1.05);
    background: rgba(255, 255, 255, 0.32);
}

  </style>
</head>
</body>

  <div class="container">
    <div class="circle circle3"></div>
    <div class="circle circle4"></div>


    <div class="glass-box">
      <h1>FAQ Unavailable.</h1>
      <p>This page is not finished.</p>
    </div>

    <button class="go-back-btn" onclick="history.back()">
    <i class="fa-solid fa-arrow-left"></i> Go Back
    </button>







</body>
</html>
